name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
        timeout-minutes: 5

      - name: Run tests
        run: npx jest --passWithNoTests --ci
        timeout-minutes: 5
